[tools]
node = "25"
pnpm = "10"

[tasks.install]
description = "Install dependencies"
run = "pnpm install"

[tasks.dev]
description = "Start dev server"
run = "pnpm dev"

[tasks.build]
description = "Type-check and build for production"
run = "pnpm build"

[tasks.preview]
description = "Preview production build"
run = "pnpm preview"

[tasks.typecheck]
description = "Run type checking"
run = "vue-tsc -b"
